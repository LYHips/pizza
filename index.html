<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZERIA — Смачна та гаряча піца</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">PIZZA<span>DOMA</span></div>
        <div class="cart" onclick="toggleCart()">Кошик: <span id="cart-count" >0</span> шт.</div>
    </header>
 
    <section class="hero">
        <h1>Справжня італійська піца</h1>
        <p>Гаряча, соковита та з хрусткою скоринкою. Доставка до 30 хвилин у будь-який куточок міста!</p>
        <a href="#menu" class="btn-menu">Обрати піцу</a>
    </section>

    <section class="menu-section" id="menu">
        <h2>Наше Меню</h2>
        
        <div class="pizza-grid">

        </div>
    </section>





<div id="cart-modal" class="cart-modal">
    <div class="cart-header">
        <h3>Ваше замовлення</h3>

        <button class="close-cart" onclick="toggleCart()">&times;</button>
    </div>

    
    <div id="cart-items" class="cart-items-list">
        

        
        
    </div>


    <div class="cart-footer">
        <div class="cart-total">
            <span>Загальна сума:</span>
            <span id="cart-total-amount"> ₴</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">Замовити</button>
    </div>
</div>
    

    <footer>
        <p>&copy; 2026 PIZZADOMA. Усі права захищені. Доставка з 10:00 до 22:00.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
